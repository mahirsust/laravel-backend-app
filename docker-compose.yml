services:
  
  laravel_backend:
    build:
      context: ./docker/php
    container_name: laravel_container
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - ./backend:/var/www/

  nginx:
    image: nginx:1.31.2
    container_name: nginx_container
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - laravel_backend
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/

  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: redis_container
    restart: unless-stopped
    ports:
      - "6380:6379"

  redisinsight:
    image: redislabs/redisinsight:3.6.0
    container_name: redisinsight_container
    restart: unless-stopped
    ports:
      - "5541:5540"

  horizon:
    build:
      context: ./docker/php
    container_name: horizon_container
    command: php artisan horizon
    restart: unless-stopped
    depends_on:
      - laravel_backend
      - redis
    volumes:
      - ./backend:/var/www/

  scheduler:
    build:
      context: ./docker/php
    container_name: scheduler_container
    command: php artisan schedule:work
    restart: unless-stopped
    depends_on:
      - laravel_backend
    volumes:
      - ./backend:/var/www/

volumes:
  mysql_data: